spring.application.name=firstclub-membership

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:membershipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Partial unique index for active membership is in schema-indexes.sql (production DBs only)
# H2 does not support partial indexes; app-level guard in UserMembershipService covers dev/test

# Server
server.port=8000

# Logging
logging.level.com.firstclub=INFO
